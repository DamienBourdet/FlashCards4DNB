<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards Technologie 3ème</title>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#0f0e17; color:#fffffe;
  font-family:'Segoe UI',Arial,sans-serif;
  min-height:100vh; overflow-x:hidden;
}
body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background-image:linear-gradient(rgba(167,139,250,0.04) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(167,139,250,0.04) 1px,transparent 1px);
  background-size:40px 40px;
}
.wrap { position:relative; z-index:1; max-width:860px; margin:0 auto; padding:28px 18px; }

/* ── HEADER ── */
.app-header {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:24px; flex-wrap:wrap; gap:10px;
}
.app-title { display:flex; align-items:center; gap:10px; }
.app-icon {
  width:30px; height:30px; background:linear-gradient(135deg,#ff6b35,#a78bfa);
  clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  display:grid; place-items:center; font-size:13px; flex-shrink:0;
}
.app-title-text { font-size:16px; font-weight:800; letter-spacing:-0.3px; }
.app-title-sub { font-family:'Courier New',monospace; font-size:9px; color:#a7a9be; letter-spacing:2px; }
.app-stats { display:flex; gap:16px; }
.stat { display:flex; flex-direction:column; align-items:center; gap:1px; font-family:'Courier New',monospace; font-size:10px; color:#a7a9be; }
.stat-val { font-size:18px; font-weight:700; color:#fffffe; }
.stat-val.g { color:#3de8c8; }
.stat-val.o { color:#ff6b35; }

/* ── LOADING ── */
#panelLoading { text-align:center; padding:80px 20px; }
.spinner {
  width:40px; height:40px; border:3px solid rgba(255,255,255,0.1); border-top-color:#a78bfa;
  border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 18px;
}
@keyframes spin { to { transform:rotate(360deg); } }
.loading-text { font-family:'Courier New',monospace; color:#a7a9be; font-size:13px; }

/* ── ERREUR ── */
#panelError {
  display:none; background:rgba(255,107,53,0.08); border:1px solid rgba(255,107,53,0.3);
  border-radius:12px; padding:32px; text-align:center;
}
.error-title { font-size:16px; font-weight:700; color:#ff6b35; margin-bottom:10px; }
.error-msg { font-family:'Courier New',monospace; font-size:12px; color:#a7a9be; line-height:1.7; }
.btn-retry {
  margin-top:18px; padding:10px 22px; background:#ff6b35; color:#fff; border:none;
  border-radius:6px; font-size:13px; font-weight:700; cursor:pointer;
}
.btn-retry:hover { background:#ff8555; }

/* ── APP ── */
#panelApp { display:none; }

/* THEMES */
.themes-label { font-family:'Courier New',monospace; font-size:10px; letter-spacing:2px; color:#a7a9be; text-transform:uppercase; margin-bottom:8px; }
.themes-grid { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:16px; }
.theme-btn {
  background:#1a1828; border:1px solid rgba(255,255,255,0.08); color:#a7a9be;
  padding:6px 12px; border-radius:5px; cursor:pointer;
  font-family:'Segoe UI',Arial,sans-serif; font-size:12px; font-weight:700;
  transition:all 0.2s; display:flex; align-items:center; gap:5px; white-space:nowrap;
}
.theme-btn:hover { color:#fffffe; border-color:rgba(255,255,255,0.2); }
.theme-btn.active { color:#fffffe; background:rgba(255,255,255,0.07); border-color:rgba(255,255,255,0.25); }
.theme-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }

/* PROGRESS */
.progress-wrap { background:#1a1828; height:3px; border-radius:2px; margin-bottom:16px; overflow:hidden; }
.progress-fill { height:100%; border-radius:2px; transition:width 0.5s cubic-bezier(0.4,0,0.2,1); }

/* CARD */
.card-area { perspective:1200px; min-height:260px; margin-bottom:14px; }
.flashcard {
  width:100%; min-height:260px; position:relative;
  transform-style:preserve-3d; transition:transform 0.55s cubic-bezier(0.4,0,0.2,1); cursor:pointer;
}
.flashcard.flipped { transform:rotateY(180deg); }
.card-face {
  position:absolute; width:100%; min-height:260px; backface-visibility:hidden;
  background:#211f33; border:1px solid rgba(255,255,255,0.08); border-radius:12px;
  padding:38px 28px 30px; display:flex; flex-direction:column;
  justify-content:center; align-items:center; text-align:center;
}
.card-face-back { transform:rotateY(180deg); }
.card-bar { position:absolute; top:0; left:0; right:0; height:3px; border-radius:12px 12px 0 0; }
.card-meta { position:absolute; top:12px; left:16px; right:16px; display:flex; justify-content:space-between; align-items:center; }
.card-tag {
  font-family:'Courier New',monospace; font-size:9px; letter-spacing:1.5px; text-transform:uppercase;
  padding:3px 8px; border-radius:3px; font-weight:600;
  max-width:65%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.card-num { font-family:'Courier New',monospace; font-size:10px; color:#a7a9be; }
.side-label { font-family:'Courier New',monospace; font-size:9px; letter-spacing:3px; text-transform:uppercase; color:#a7a9be; margin-bottom:12px; opacity:0.6; }
.card-question { font-size:18px; font-weight:700; line-height:1.45; max-width:620px; }
.card-answer { font-size:15px; line-height:1.75; max-width:620px; }
.flip-hint { position:absolute; bottom:12px; right:16px; font-family:'Courier New',monospace; font-size:9px; color:#a7a9be; opacity:0.4; }

/* SCORE */
.score-area { display:flex; gap:8px; justify-content:center; margin-bottom:12px; min-height:38px; align-items:center; opacity:0; pointer-events:none; transition:opacity 0.3s; }
.score-area.visible { opacity:1; pointer-events:all; }

/* CONTROLS */
.controls { display:flex; gap:6px; justify-content:center; margin-bottom:14px; flex-wrap:wrap; }
.btn {
  padding:9px 16px; border-radius:6px; border:none;
  font-family:'Segoe UI',Arial,sans-serif; font-size:12px; font-weight:700;
  cursor:pointer; transition:all 0.18s; display:flex; align-items:center; gap:4px;
}
.btn-prev, .btn-shuffle { background:#1a1828; color:#a7a9be; border:1px solid rgba(255,255,255,0.08); }
.btn-prev:hover, .btn-shuffle:hover { color:#fffffe; }
.btn-next { background:#ff6b35; color:#fff; }
.btn-next:hover { background:#ff8555; }
.btn-flip { background:transparent; color:#a78bfa; border:1px solid #a78bfa; }
.btn-flip:hover { background:rgba(167,139,250,0.1); }
.btn-know { background:rgba(61,232,200,0.1); color:#3de8c8; border:1px solid #3de8c8; padding:9px 16px; }
.btn-know:hover { background:rgba(61,232,200,0.2); }
.btn-dontknow { background:rgba(255,107,53,0.1); color:#ff6b35; border:1px solid #ff6b35; padding:9px 16px; }
.btn-dontknow:hover { background:rgba(255,107,53,0.2); }

/* DOTS */
.dots { display:flex; flex-wrap:wrap; gap:4px; justify-content:center; padding-bottom:8px; }
.dot { width:7px; height:7px; border-radius:50%; opacity:0.2; cursor:pointer; transition:all 0.2s; }
.dot:hover { opacity:0.6; transform:scale(1.3); }
.dot.current { opacity:1!important; transform:scale(1.6); }
.dot.known { background:#3de8c8!important; opacity:0.9!important; }
.dot.unknown { background:#ff6b35!important; opacity:0.9!important; }

/* SHORTCUTS */
.shortcuts { text-align:center; font-family:'Courier New',monospace; font-size:10px; color:#a7a9be; opacity:0.4; margin-bottom:14px; }
kbd { background:#1a1828; border:1px solid rgba(255,255,255,0.1); border-radius:3px; padding:1px 5px; font-size:10px; }

/* TOAST */
.toast {
  position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(60px);
  background:#2a2840; border:1px solid rgba(255,255,255,0.08);
  padding:9px 18px; border-radius:8px; font-family:'Courier New',monospace;
  font-size:12px; color:#fffffe; transition:transform 0.3s;
  z-index:9999; white-space:nowrap; pointer-events:none;
}
.toast.show { transform:translateX(-50%) translateY(0); }

@media(max-width:500px){
  .wrap { padding:16px 12px; }
  .card-face { padding:36px 14px 28px; }
  .card-question { font-size:15px; }
  .card-answer { font-size:13px; }
  .btn { padding:8px 10px; font-size:11px; }
}
</style>
</head>
<body>
<div class="wrap">

  <!-- HEADER -->
  <div class="app-header">
    <div class="app-title">
      <div class="app-icon">⚙</div>
      <div>
        <div class="app-title-text">Flashcards Technologie 3ème</div>
        <div class="app-title-sub">DNB · BO N°31 DU 30 JUILLET 2020</div>
      </div>
    </div>
    <div class="app-stats" id="statsBar" style="display:none">
      <div class="stat"><span class="stat-val" id="statTotal">0</span><span>cartes</span></div>
      <div class="stat"><span class="stat-val g" id="statKnown">0</span><span>sus</span></div>
      <div class="stat"><span class="stat-val o" id="statUnknown">0</span><span>à revoir</span></div>
    </div>
  </div>

  <!-- LOADING -->
  <div id="panelLoading">
    <div class="spinner"></div>
    <div class="loading-text">Chargement des flashcards…</div>
  </div>

  <!-- ERREUR -->
  <div id="panelError">
    <div class="error-title">⚠ Impossible de charger le fichier</div>
    <div class="error-msg" id="errorMsg">—</div>
    <button class="btn-retry" id="btnRetry">↺ Réessayer</button>
  </div>

  <!-- APP -->
  <div id="panelApp">
    <div class="themes-label">Thématique</div>
    <div class="themes-grid" id="themeGrid"></div>

    <div class="progress-wrap">
      <div class="progress-fill" id="progressBar" style="width:0%"></div>
    </div>

    <div class="card-area">
      <div class="flashcard" id="flashcard">
        <!-- RECTO -->
        <div class="card-face card-face-front">
          <div class="card-bar" id="barFront"></div>
          <div class="card-meta">
            <span class="card-tag" id="tagFront">—</span>
            <span class="card-num" id="cardNum">—</span>
          </div>
          <div class="side-label">Question</div>
          <div class="card-question" id="cardQuestion">—</div>
          <div class="flip-hint">↺ cliquer pour retourner</div>
        </div>
        <!-- VERSO -->
        <div class="card-face card-face-back">
          <div class="card-bar" style="background:#3de8c8"></div>
          <div class="card-meta">
            <span class="card-tag" id="tagBack" style="color:#3de8c8;background:rgba(61,232,200,0.12)">—</span>
          </div>
          <div class="side-label">Réponse</div>
          <div class="card-answer" id="cardAnswer">—</div>
        </div>
      </div>
    </div>

    <div class="score-area" id="scoreArea">
      <button class="btn btn-dontknow" id="btnDontKnow">✗ À revoir</button>
      <button class="btn btn-know" id="btnKnow">✓ Je sais</button>
    </div>

    <div class="controls">
      <button class="btn btn-prev" id="btnPrev">← Préc.</button>
      <button class="btn btn-flip" id="btnFlip">↺ Retourner</button>
      <button class="btn btn-next" id="btnNext">Suiv. →</button>
      <button class="btn btn-shuffle" id="btnShuffle">⇄ Mélanger</button>
    </div>

    <div class="shortcuts">
      <kbd>←</kbd> <kbd>→</kbd> naviguer &nbsp;|&nbsp;
      <kbd>Espace</kbd> retourner &nbsp;|&nbsp;
      <kbd>Entrée</kbd> "Je sais"
    </div>

    <div class="dots" id="dotsContainer"></div>
  </div>

</div><!-- /wrap -->

<div class="toast" id="toast"></div>

<!-- SheetJS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script>
(function(){
  'use strict';

  // ── URL de téléchargement direct (Nextcloud apps.education.fr)
  // La convention Nextcloud : lien_partage + /download
  var FILE_URL = 'https://nuage06.apps.education.fr/index.php/s/nZTZebaNyjH7DKb/download';

  var PALETTE = [
    '#a78bfa','#3de8c8','#ff6b35','#f7c59f',
    '#60a5fa','#f472b6','#34d399','#fbbf24',
    '#e879f9','#38bdf8','#fb7185','#a3e635'
  ];

  var allCards=[], currentCards=[], currentIndex=0, isFlipped=false, scores={}, selectedTheme='Tous', themeColors={};

  function el(id){ return document.getElementById(id); }

  // ── PANELS ──────────────────────────────────────────────────
  function showPanel(name){
    el('panelLoading').style.display = name==='loading' ? 'block' : 'none';
    el('panelError').style.display   = name==='error'   ? 'block' : 'none';
    el('panelApp').style.display     = name==='app'     ? 'block' : 'none';
    el('statsBar').style.display     = name==='app'     ? 'flex'  : 'none';
  }

  // ── CHARGEMENT ──────────────────────────────────────────────
  function loadFile(){
    showPanel('loading');
    fetch(FILE_URL)
      .then(function(r){
        if(!r.ok) throw new Error('Erreur HTTP ' + r.status + ' lors du téléchargement du fichier.');
        return r.arrayBuffer();
      })
      .then(parseXlsx)
      .catch(function(err){
        showPanel('error');
        el('errorMsg').innerHTML =
          'Le fichier n\'a pas pu être chargé.<br><br>' +
          '<strong>Causes possibles :</strong><br>' +
          '• Le lien de partage Nextcloud a expiré ou a été modifié<br>' +
          '• Le réseau bloque les requêtes vers nuage06.apps.education.fr<br>' +
          '• Le fichier n\'est pas partagé en accès public<br><br>' +
          '<em>Détail : ' + err.message + '</em>';
      });
  }

  // ── PARSE XLSX ──────────────────────────────────────────────
  function parseXlsx(buf){
    var wb   = XLSX.read(buf, {type:'array'});
    var ws   = wb.Sheets[wb.SheetNames[0]];
    var rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});

    // Ignorer ligne d'en-tête si présente
    var start = 0;
    var first = String(((rows[0])||[])[0]||'').toLowerCase();
    if(first==='' || first.includes('th') || first.includes('quest')) start = 1;

    var parsed = [];
    for(var i=start; i<rows.length; i++){
      var row   = rows[i];
      var theme = String(row[0]||'').trim();
      var q     = String(row[1]||'').trim();
      var a     = String(row[2]||'').trim();
      if(theme && q && a) parsed.push({theme:theme, q:q, a:a});
    }
    if(!parsed.length) throw new Error('Aucune donnée trouvée dans les colonnes A, B, C.');

    allCards = parsed;
    buildColors();
    showPanel('app');
    filterCards('Tous');
    showToast('✓ ' + allCards.length + ' flashcards chargées !');
  }

  function buildColors(){
    var themes = [];
    allCards.forEach(function(c){ if(themes.indexOf(c.theme)<0) themes.push(c.theme); });
    themes.forEach(function(t,i){ themeColors[t] = PALETTE[i % PALETTE.length]; });
  }

  // ── THEMES ──────────────────────────────────────────────────
  function buildThemeGrid(){
    var grid = el('themeGrid');
    grid.innerHTML = '';
    var themes = [];
    allCards.forEach(function(c){ if(themes.indexOf(c.theme)<0) themes.push(c.theme); });

    var allBtn = document.createElement('button');
    allBtn.className = 'theme-btn' + (selectedTheme==='Tous' ? ' active' : '');
    allBtn.innerHTML = '<span class="theme-dot" style="background:linear-gradient(135deg,#ff6b35,#a78bfa)"></span>Tous (' + allCards.length + ')';
    allBtn.onclick = function(){ filterCards('Tous'); };
    grid.appendChild(allBtn);

    themes.forEach(function(t){
      var count = allCards.filter(function(c){ return c.theme===t; }).length;
      var btn = document.createElement('button');
      btn.className = 'theme-btn' + (selectedTheme===t ? ' active' : '');
      btn.innerHTML = '<span class="theme-dot" style="background:' + themeColors[t] + '"></span>' + t + ' (' + count + ')';
      btn.onclick = (function(th){ return function(){ filterCards(th); }; })(t);
      grid.appendChild(btn);
    });
  }

  // ── FILTER ──────────────────────────────────────────────────
  function filterCards(key){
    selectedTheme = key;
    currentCards  = key==='Tous' ? allCards.slice() : allCards.filter(function(c){ return c.theme===key; });
    currentIndex  = 0;
    isFlipped     = false;
    buildThemeGrid();
    el('progressBar').style.background = key==='Tous'
      ? 'linear-gradient(90deg,#ff6b35,#a78bfa,#3de8c8)'
      : (themeColors[key] || '#a78bfa');
    renderCard();
    renderDots();
    updateStats();
  }

  // ── RENDER ──────────────────────────────────────────────────
  function renderCard(){
    if(!currentCards.length) return;
    var card  = currentCards[currentIndex];
    var color = themeColors[card.theme] || '#a78bfa';

    el('barFront').style.background    = color;
    el('tagFront').textContent         = card.theme;
    el('tagFront').style.color         = color;
    el('tagFront').style.background    = color + '22';
    el('tagBack').textContent          = card.theme;
    el('cardNum').textContent          = (currentIndex+1) + ' / ' + currentCards.length;
    el('cardQuestion').textContent     = card.q;
    el('cardAnswer').textContent       = card.a;

    el('flashcard').classList.remove('flipped');
    el('scoreArea').classList.remove('visible');
    isFlipped = false;

    var pct = currentCards.length > 1 ? (currentIndex / (currentCards.length-1)) * 100 : 100;
    el('progressBar').style.width = pct + '%';
  }

  function renderDots(){
    var container = el('dotsContainer');
    container.innerHTML = '';
    currentCards.forEach(function(c, i){
      var dot = document.createElement('div');
      dot.className = 'dot';
      var key = c.theme + '::' + c.q;
      var col = themeColors[c.theme] || '#a78bfa';
      if(i === currentIndex){
        dot.classList.add('current');
        dot.style.background = col;
      } else if(scores[key] === 'known'){
        dot.classList.add('known');
      } else if(scores[key] === 'unknown'){
        dot.classList.add('unknown');
      } else {
        dot.style.background = col;
        dot.style.opacity    = '0.2';
      }
      dot.title   = 'Carte ' + (i+1);
      dot.onclick = (function(idx){ return function(){ currentIndex=idx; isFlipped=false; renderCard(); renderDots(); }; })(i);
      container.appendChild(dot);
    });
  }

  function updateStats(){
    el('statTotal').textContent   = allCards.length;
    el('statKnown').textContent   = Object.values(scores).filter(function(v){ return v==='known'; }).length;
    el('statUnknown').textContent = Object.values(scores).filter(function(v){ return v==='unknown'; }).length;
  }

  // ── ACTIONS ─────────────────────────────────────────────────
  function flipCard(){
    isFlipped = !isFlipped;
    el('flashcard').classList.toggle('flipped', isFlipped);
    if(isFlipped) el('scoreArea').classList.add('visible');
  }

  function nextCard(){
    if(currentIndex < currentCards.length-1) currentIndex++;
    else { currentIndex=0; showToast('🔁 Retour au début !'); }
    isFlipped = false;
    renderCard();
    renderDots();
  }

  function prevCard(){
    if(currentIndex > 0){ currentIndex--; isFlipped=false; renderCard(); renderDots(); }
  }

  function markCard(known){
    var key = currentCards[currentIndex].theme + '::' + currentCards[currentIndex].q;
    scores[key] = known ? 'known' : 'unknown';
    updateStats();
    renderDots();
    showToast(known ? '✓ Bien joué !' : '↺ À revoir');
    setTimeout(nextCard, 450);
  }

  function shuffleCards(){
    for(var i=currentCards.length-1; i>0; i--){
      var j   = Math.floor(Math.random()*(i+1));
      var tmp = currentCards[i];
      currentCards[i] = currentCards[j];
      currentCards[j] = tmp;
    }
    currentIndex=0; isFlipped=false;
    renderCard(); renderDots();
    showToast('⇄ Cartes mélangées !');
  }

  function showToast(msg){
    var t = el('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function(){ t.classList.remove('show'); }, 2000);
  }

  // ── LISTENERS ───────────────────────────────────────────────
  el('flashcard').addEventListener('click', flipCard);
  el('btnFlip').addEventListener('click',     flipCard);
  el('btnNext').addEventListener('click',     nextCard);
  el('btnPrev').addEventListener('click',     prevCard);
  el('btnKnow').addEventListener('click',     function(){ markCard(true); });
  el('btnDontKnow').addEventListener('click', function(){ markCard(false); });
  el('btnShuffle').addEventListener('click',  shuffleCards);
  el('btnRetry').addEventListener('click',    loadFile);

  document.addEventListener('keydown', function(e){
    if(el('panelApp').style.display === 'none') return;
    if(e.key === 'ArrowRight') nextCard();
    if(e.key === 'ArrowLeft')  prevCard();
    if(e.key === ' ')          { e.preventDefault(); flipCard(); }
    if(e.key === 'Enter' && isFlipped) markCard(true);
  });

  // ── DÉMARRAGE ───────────────────────────────────────────────
  loadFile();

})();
</script>
</body>
</html>
